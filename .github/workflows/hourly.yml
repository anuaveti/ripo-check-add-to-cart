name: Hourly Cart Test

on:
  schedule:
#    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt update
          sudo apt install -y google-chrome-stable
      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Install Python dependencies
        run: pip install selenium
      - name: Test email credentials
        run: |
          python -c "
          import os, smtplib, ssl
          email = os.environ['ZOHO_EMAIL']
          password = os.environ['ZOHO_PASSWORD']
          for server in ['smtp.zoho.com', 'smtp.zoho.eu']:
              try:
                  server_obj = smtplib.SMTP(server, 587)
                  server_obj.starttls(context=ssl.create_default_context())
                  server_obj.login(email, password)
                  server_obj.quit()
                  print(f'Success with {server}')
                  break
              except Exception as e:
                  print(f'Failed with {server}: {e}')
          "
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
      - name: Run monitor
        run: python monitor.py
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
