name: Hourly Selenium Test (SendGrid)

on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0
  workflow_dispatch:       # manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Create a virtual environment to isolate dependencies
      - name: Create virtual environment
        run: |
          python -m venv venv
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      - name: Install dependencies (Taurus, SendGrid, urwid)
        run: |
          pip install --upgrade pip
          pip install bzt sendgrid
          # Force a known working version of urwid
          pip install urwid==1.3.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Install Google Chrome & ChromeDriver
        run: |
          # Add Google Chrome repository
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          # Get exact Chrome version and download matching ChromeDriver
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
          echo "Chrome version: $CHROME_VERSION"
          wget "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chromedriver-linux64.zip"
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          rm -rf chromedriver-linux64 chromedriver-linux64.zip

      - name: Run Taurus test
        id: taurus
        run: |
          bzt RIPO-add-to-cart-Selenium.yaml \
            -o modules.selenium.headless=true \
            -o modules.selenium.headless_window_size=1920x1080 \
            -o modules.selenium.browser=chrome \
            -o modules.selenium.path=/usr/local/bin/chromedriver \
            > output.log 2>&1
        continue-on-error: true

      # Print log for debugging in GitHub Actions (optional)
      - name: Print output.log for debugging
        run: cat output.log

      - name: Send email notification
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python send_email.py
