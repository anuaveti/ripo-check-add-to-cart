name: Hourly Selenium Test (SendGrid)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Taurus and dependencies
        run: |
          pip install bzt
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Install Google Chrome & ChromeDriver (official)
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
          echo "Chrome version: $CHROME_VERSION"

          wget "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chromedriver-linux64.zip"
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          rm -rf chromedriver-linux64 chromedriver-linux64.zip

      - name: Run Taurus test
        id: taurus
        run: |
          bzt RIPO-add-to-cart-Selenium.yaml \
            -o modules.selenium.headless=true \
            -o modules.selenium.headless_window_size=1920x1080 \
            -o modules.selenium.browser=chrome \
            -o modules.selenium.path=/usr/local/bin/chromedriver \
            > output.log 2>&1
        continue-on-error: true

      - name: Send email notification
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python send_email.py
